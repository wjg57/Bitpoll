services:
  bitpoll:
    container_name: bitpoll
    restart: unless-stopped
    ports:
      - 3008:3008  # uwsgi port - should only be visible to web frontend.
      - 3009:3009  # http port - should only be used during testing.
    build:
      dockerfile: Dockerfile
      context: .
      args:
        UID: ${UID} # Set in .env
        GID: ${GID} # Set in .env
    volumes:
      # Static web pages (re-)generated by build:
      - ${BASEDIR}/run/static:/opt/static
      # Configuration files and database:
      - ${BASEDIR}/run/config:/opt/config
      # Log files:
      - ${BASEDIR}/run/log:/opt/log

  web:
    image: nginx:latest
    container_name: bitpoll-web
    restart: unless-stopped
    depends_on:
      - bitpoll
    volumes:
      # NGINX configuration
      - ${BASEDIR}/run/config/nginx.conf:/etc/nginx/conf.d/default.conf
      # Static web pages:
      - ${BASEDIR}/run/static:/opt/static
    ports:
      - "80:80"
